<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>эволюция чисел</title>
    <style>
        html, body {
            overscroll-behavior: none; /* или overscroll-behavior-y: none; для вертикального свайпа */
        }
    </style>
</head>
<body>
    <p>стоимость:</p>
    <textarea id="textBox2"></textarea>
    <p>наборы:</p>
    <textarea id="textBox1"></textarea>
    <p></p>
    <button id="button1">Посчитать</button>
    <p>
        <input type="checkbox" id="checkBox1">
        <label for="checkBox1">удалять убыточные варианты ($ < 0)</label>
    </p>
    <p>
        <input type="checkbox" id="checkBox2">
        <label for="checkBox2">удалять избыточные варианты (одинаковых > 2)</label>
    </p>
    <script>
        const textBox1 = document.getElementById('textBox1');
        const textBox2 = document.getElementById('textBox2');
        const button1 = document.getElementById('button1');
        const checkBox1 = document.getElementById('checkBox1');
        const checkBox2 = document.getElementById('checkBox2');
        
        button1.addEventListener('click', () => {this.button1_Click();});
        
        function button1_Click() {
            var list = parse();
            var prices = parse2();
            var result = calculation(list, prices);
            output(result[0], result[1]);
        }
        
        function parse() {
            var list = [];
            var str = textBox1.value;
            let i = 0;
            var price = "";
            for(; i < str.length && str[i] != '['; i++)
                if(str[i] != ' ' && str[i] != '$' && str[i] != '/' && str[i] != '\n') price += str[i];
            if(!Number.isInteger(parseInt(price))) price = "0";
            list.push(parseInt(price));
            for(; i < str.length; i++) {
                var seq = []; var num = ""; var P = "";
                while(i < str.length && str[i] != '[') i++; i++;
                if(!(i < str.length)) break;
                for(; i < str.length; i++) {
                    if(str[i] != ' ') {
                        if(str[i] == ']') {
                        
                            if(num != "") seq.push(parseInt(num));
                            break;
                        }
                        if(str[i] != ';') num += str[i];
                        else {
                            if(num != "") seq.push(parseInt(num));
                            num = "";
                        }
                    }
                } 
                i++;
                while(i < str.length && (str[i] == ' ' || str[i] == '/')) i++;
                do {
                    P = "";
                    for(; i < str.length && str[i] != '\n' && str[i] != '%' && str[i] != '$'; i++) if(str[i] != ' ') P += str[i];
                } while(i < str.length && str[i] == '$' && str[i++] != '\n');
                //if(seq.length != 0) 
                list.push([seq, parseFloat(P)]);
            }
            return list;
        }
        
        function parse2() {
            var list = [];
            var str = textBox2.value;
            for(let i = 0; i < str.length; i++) {
                var num = "", price = "";
                while(i < str.length && str[i] != '/' && str[i] != '\n') { if(str[i] != ' ') num += str[i]; i++; }
                while(i < str.length && str[i] != '\n') { if(str[i] != ' ' && str[i] != '/' && str[i] != '$') price += str[i]; i++; }
                if(num != "" && price != "") list.push([parseInt(num), parseInt(price)]);
            }
            return list;
        }
        
        function output(list, prices) {
            textBox1.value = list[0] + "$";
            for(let i = 1; i < list.length; i++) {
                textBox1.value += "\n    [";
                for(let j = 0; j < list[i][0].length; j++) {
                    if(j != 0) textBox1.value += "; ";
                    textBox1.value += list[i][0][j] + "";
                }
                if(list[i][2] < 0) textBox1.value += "] //+" + (-list[i][2]) + "$ " + list[i][1] + "%";
                else textBox1.value += "] //-" + list[i][2] + "$ " + list[i][1] + "%";
            }
            
            textBox2.value = "";
            for(let i = 0; i < prices.length; i++) {
                if(i != 0) textBox2.value += "\n";
                textBox2.value += prices[i][0] + " //" + prices[i][1] + "$";
            }
        }
        
        function calculation(list, prices_) {
            var prices = prices_;
            var list2 = [];
            for(let i = 1; i < list.length; i++) {
                var seq = [];
                for(let l = 0; l < list[i][0].length; l++) seq.push(list[i][0][l]);
                seq.push(1);
                if(seq.length > 1) seq.sort((a, b) => a - b);
                let c = true;
                for(let l = 0; l+2 < seq.length; l++) if(seq[l] === seq[l+2]) { console.log("!"); c = false; l = seq.length; }
                if(!checkBox2.checked || c === true) {
                    c = true;
                    for(let l = 0; l < list2.length; l++) if(list_Eq(list2[l][0], [...seq])) {
                        list2[l][1] += list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1);
                        c = false;
                        break;
                    }
                    if(c) list2.push([[...seq], list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1)]);
                }
                for(let j = 0; j < list[i][0].length; j++) for(let k = j+1; k < list[i][0].length; k++) {
                    seq = [];
                    for(let l = 0; l < list[i][0].length; l++) if(l != j && l != k) seq.push(list[i][0][l]);
                    var mtr = mating(list[i][0][j], list[i][0][k]);
                    for(let l = 0; l < mtr.length; l++) seq.push(mtr[l]);
                    if(seq.length > 1) seq.sort((a, b) => a - b);
                    let c = true;
                    for(let l = 0; l+2 < seq.length; l++) if(seq[l] === seq[l+2]) { console.log("!"); c = false; l = seq.length; }
                    if(!checkBox2.checked || c === true) {
                        c = true;
                        for(let l = 0; l < list2.length; l++) if(list_Eq(list2[l][0], [...seq])) {
                            list2[l][1] += list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1);
                            c = false;
                            l = list2.length;
                        }
                        if(c) list2.push([[...seq], list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1)]);
                    }
                }
            }
            list2.sort((a, b) => b[1] - a[1]);
            
            var list3 = [list[0]+1];
            for(let i = 0; i < list2.length; i++) {
                let sum = 0;
                var num = false;
                for(let j = 0; j < list2[i][0].length; j++) {
                    var price = get_price(prices, list2[i][0][j]);
                    if(price !== '?') sum += price;
                    else if(!num) num = list2[i][0][j];
                    else {
                        num = false;
                        sum = "?";
                        j = list2[i][0].length;
                    }
                }
                if(sum !== "?" && num !== false) {
                    prices.push([parseInt(num), list3[0] - sum]);
                    sum = list3[0];
                }
                if(sum !== "?") {
                    if(!checkBox1.checked) list3.push([list2[i][0], list2[i][1], list3[0] - sum]);
                    else if(list3[0] - sum <= 0) list3.push([list2[i][0], list2[i][1], list3[0] - sum]);
                }
                else list3.push([list2[i][0], list2[i][1], sum]);
            }
            
            return [list3, prices];
        }
        
        function get_price(prices, num) {
            for(let i = 0; i < prices.length; i++) if(num == prices[i][0]) return prices[i][1];
            return '?';
        }
        
        function list_Eq(a, b) {
            //console.log("[" + a + "] [" + b + "]");
            try {
                if(a === b) return true;
                if(a.length != b.length) return false;
                for(let i = 0; i < a.length; i++) if(a[i] !== b[i]) return false;
                return true;
            } catch(Exception) { return false; }
        }
        
        function mating(n1, n2) {
            list = [];
			try {
				a = n1*n2 - 1;
				if(a < 0) {
				    list.push(-1);
				    a = -a;
				}
                a -= a%1;
				if(a == 1) return list;
				for(let i = 0, b = 2, c = 1; true;) {
					if(a == 0) {
						list.push(a);
						break;
					}
					while ((a/(10*i+b))%1 == 0) {
						if((a/(10*i+b)) < 10*i+b) {
							list.push(a);
							c = 0;
							break;
						}
						list.push(10*i+b);
						a /= (10*i+b);
					}
					if ((a/(10*i+b))%1 != 0) {
						if (b == 2) b = 3;
						else if (b == 3 && i == 0) b = 5;
						else if (b == 5) b = 7;
						else if (b == 7 && i == 0) { b = 1; i++; }
						else if (b == 1) b = 3;
						else if (b == 3) b = 7;
						else if (b == 7) b = 9;
						else if (b == 9) { b = 1; i++; }
					}
					if((a/(10*i+b)) < 10*i+b) {
						if (c == 1) list.push(a);
						break;
					}
				}
			} catch(Exception) { return list; }
			return list;
        }
    </script>
</body>
</html>
