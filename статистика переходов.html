<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>эволюция чисел</title>
    <style>
    </style>
</head>
<body>
    <textarea id="textBox1"></textarea>
    <button id="button1">Посчитать</button>
    <textarea id="textBox2"></textarea>
    <script>
        const textBox1 = document.getElementById('textBox1');
        const textBox2 = document.getElementById('textBox2');
        const button1 = document.getElementById('button1');
        
        button1.addEventListener('click', () => {this.button1_Click();});
        
        function button1_Click() {
            var list = parse();
            list = calculation(list);
            output(list);
        }
        
        function parse() {
            var list = [];
            var str = textBox1.value;
            for(let i = 0; i < str.length; i++) {
                var seq = []; var num = ""; var P = "";
                while(i < str.length && str[i] != '[') i++; i++;
                if(!(i < str.length)) break;
                for(; i < str.length; i++) {
                    if(str[i] != ' ') {
                        if(str[i] == ']') {
                            seq.push(parseInt(num));
                            break;
                        }
                        if(str[i] != ';') num += str[i];
                        else {
                            seq.push(parseInt(num));
                            num = "";
                        }
                    }
                } 
                i++;
                while(i < str.length && (str[i] == ' ' || str[i] == '/')) i++;
                for(; i < str.length && str[i] != '\n'; i++) if(str[i] != ' ' && str[i] != '%') P += str[i];
                if(seq.length != 0) list.push([seq, parseFloat(P)]);
            }
            return list;
        }
        
        function output(list) {
            textBox2.value = "";
            for(let i = 0; i < list.length; i++) {
                if(i != 0) textBox2.value += "\n";
                textBox2.value += "    [";
                for(let j = 0; j < list[i][0].length; j++) {
                    if(j != 0) textBox2.value += "; ";
                    textBox2.value += list[i][0][j] + "";
                }
                textBox2.value += "] //" + list[i][1] + "%";
            }
        }
        
        function calculation(list) {
            list2 = [];
            for(let i = 0; i < list.length; i++) {
                var seq = [];
                for(let l = 0; l < list[i][0].length; l++) seq.push(list[i][0][l]);
                seq.push(1);
                seq.sort((a, b) => a - b);
                list2.push([seq, list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1)]);
                for(let j = 0; j < list[i][0].length; j++) for(let k = j+1; k < list[i][0].length; k++) {
                    seq = [];
                    for(let l = 0; l < list[i][0].length; l++) if(l != j && l != k) seq.push(list[i][0][l]);
                    var mtr = mating(list[i][0][j], list[i][0][k]);
                    for(let l = 0; l < mtr.length; l++) seq.push(list[i][0][l]);
                    seq.sort((a, b) => a - b);
                    for(let l = 0; l < list2.length; l++) if(list2[l][0] == seq) {
                        list2[l][1] += list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1)
                        break;
                    }
                    else list2.push([seq, list[i][1]/(list[i][0].length*(list[i][0].length-1)/2+1)]);
                }
            }
            return list2;
        }
        
        function mating(n1, n2) {
            list = [];
			try {
				a = n1*n2 - 1;
				if(a < 0) {
				    list.push(-1);
				    a = -a;
				}
				if(a == 1) return list;
                a -= a%1;
				for(let i = 0, b = 2, c = 1; true;) {
					if(a == 0) {
						list.push(a);
						break;
					}
					while ((a/(10*i+b))%1 == 0) {
						if((a/(10*i+b)) < 10*i+b) {
							list.push(a);
							c = 0;
							break;
						}
						list.push(10*i+b);
						a /= (10*i+b);
					}
					if ((a/(10*i+b))%1 != 0) {
						if (b == 2) b = 3;
						else if (b == 3 && i == 0) b = 5;
						else if (b == 5) b = 7;
						else if (b == 7 && i == 0) { b = 1; i++; }
						else if (b == 1) b = 3;
						else if (b == 3) b = 7;
						else if (b == 7) b = 9;
						else if (b == 9) { b = 1; i++; }
					}
					if((a/(10*i+b)) < 10*i+b) {
						if (c == 1) list.push(a);
						break;
					}
				}
			} catch(Exception) { return list; }
			return list;
        }
    </script>
</body>
</html>
